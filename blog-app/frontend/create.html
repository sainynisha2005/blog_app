<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog App - Create Post</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Create New Post</h1>
      <nav>
        <a href="index.html" class="nav-link">
          <span class="home-icon">◀</span> Home
        </a>
        <a href="create.html" class="nav-link active">
          <span class="create-icon">✚</span> Create
        </a>
      </nav>
    </header>

    <form id="createForm">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Enter blog title">

      <label for="content">Content</label>
      <textarea id="content" placeholder="Write your blog content here..."></textarea>

      <label for="image">Upload Image</label>
      <input type="file" id="image" accept="image/*">

      <button type="button" onclick="createPost()">Create Post</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
